<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:74px;overflow-x:hidden}
body.t-s{background:linear-gradient(160deg,#ffe0f0 0%,#f0e0ff 50%,#dde8ff 100%)}
body.t-c{background:linear-gradient(160deg,#dde8ff 0%,#e8d8ff 50%,#d8f0ff 100%)}
body.t-p{background:linear-gradient(160deg,#ffe8f8 0%,#ffd8f0 50%,#ffe8d8 100%)}
.hdr{background:rgba(255,255,255,.88);backdrop-filter:blur(14px);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:3px dashed #e8b8d8}
.hdr-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.05rem;background:linear-gradient(135deg,#e060a0,#9060d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-date{font-size:.67rem;font-weight:700;color:#9060c0}
.body{padding:12px 12px 0;max-width:430px;margin:0 auto}
.card{background:rgba(255,255,255,.84);border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:3px 4px 0 #e8c8e0;position:relative;overflow:hidden;border:2.5px solid #e8b8d8}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e060a0,#c070d0,#8080e0,#60b0f0)}
.sec-lbl{font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;color:#c060a0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.nav-btn{width:34px;height:34px;border-radius:50%;border:2px solid #e8b8d8;background:rgba(255,255,255,.8);color:#c060a0;font-weight:900;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* 日期列 */
.days-row{display:grid;gap:4px;margin-bottom:12px}
.day-pill{border-radius:13px;padding:6px 3px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.65);position:relative}
.day-pill.active{background:linear-gradient(135deg,#e060a0,#9060d0);border-color:#c040a0}
.day-pill.is-off{background:linear-gradient(135deg,#b8e4ff,#7ecfff);border-color:#60b0e8}
.day-pill.is-today{border-color:#c040a0;border-width:2.5px}
.day-wd{font-size:.52rem;font-weight:700;color:#b080c0;margin-bottom:1px}
.day-pill.active .day-wd{color:rgba(255,255,255,.8)}
.day-pill.is-off .day-wd{color:#2080c0}
.day-num{font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:900;color:#a060b0}
.day-pill.active .day-num{color:#fff}
.day-pill.is-off .day-num{color:#1060a0}
.day-pill.is-red .day-num{color:#d04060}
.day-today-mark{font-size:.7rem;line-height:1}
.day-off-mark{font-size:.5rem;color:#4090d0;font-weight:700}
/* 班次主卡 */
.shift-hero{text-align:center;background:linear-gradient(135deg,rgba(224,96,160,.15),rgba(144,96,208,.1));border-radius:18px;padding:14px;margin-bottom:11px;border:2px dashed #e8b8d8}
.shift-time-big{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:#c060a0;margin:4px 0;letter-spacing:.03em}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{background:rgba(255,255,255,.72);border:2px solid #e8b8d8;border-radius:15px;padding:10px;text-align:center}
.info-box.full{grid-column:1/-1}
.info-box.cleaning{background:linear-gradient(135deg,rgba(255,240,180,.7),rgba(255,220,140,.5));border-color:#f0d060}
.info-icon{font-size:1.15rem;margin-bottom:3px}
.info-lbl{font-size:.58rem;font-weight:900;color:#a070b0;margin-bottom:3px}
.info-val{font-size:.72rem;font-weight:700;color:#c060a0}
.info-val.dim{color:#ccc}
/* 同班人員 */
.cw-box{margin-top:9px;background:rgba(255,255,255,.65);border:1.5px solid #e8b8d8;border-radius:13px;padding:9px 12px}
/* 全日班表 */
.shift-row{display:flex;align-items:flex-start;gap:9px;background:rgba(255,255,255,.65);border:1.5px solid #e8c0d8;border-radius:13px;padding:8px 11px;margin-bottom:5px}
.shift-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.shift-slot{font-size:.65rem;font-weight:700;color:#a070b0;min-width:50px}
.shift-person{font-size:.74rem;font-weight:700;color:#c060a0;line-height:1.7}
.me-tag{background:rgba(224,96,160,.15);border-radius:7px;padding:0 5px;color:#d040a0;font-weight:900}
/* 日曆 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{border-radius:10px;padding:5px 2px;text-align:center;background:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.4);cursor:pointer;transition:all .15s}
.cal-cell:hover{background:rgba(255,255,255,.85)}
.cal-cell.today{background:linear-gradient(135deg,#e060a0,#9060d0);border-color:#c040a0}
.cal-cell.holiday{background:rgba(255,200,200,.3);border-color:#ffaacc}
.cal-cell.has-mood{border-color:#98e0b0;border-width:2px}
.cal-cell.selected{background:linear-gradient(135deg,#ffe0f0,#f0d8ff);border-color:#c060a0;border-width:2px}
.cal-cell.is-off-cal{background:linear-gradient(135deg,#d0eeff,#b8e0ff);border-color:#80c0f0}
.cal-num{font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:700;color:#a060b0}
.cal-cell.today .cal-num{color:#fff}
.cal-cell.holiday .cal-num{color:#d04060}
.cal-cell.is-off-cal .cal-num{color:#1060a0}
.cal-cell-icons{font-size:.55rem;line-height:1.3;min-height:14px}
/* 日期詳情 */
.day-detail{background:rgba(255,255,255,.9);border:2px solid #e8b8d8;border-radius:18px;padding:14px;margin-top:10px}
/* 心情記錄 */
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.mood-btn{border:2px solid transparent;border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;background:rgba(255,255,255,.7);transition:all .2s}
.mood-btn.sel{border-color:#e060a0;background:linear-gradient(135deg,rgba(224,96,160,.2),rgba(144,96,208,.15));transform:scale(1.05)}
.mood-em{font-size:1.4rem}
.mood-lbl{font-size:.55rem;color:#a070b0;font-weight:700;margin-top:2px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag-btn{border:2px solid #e8b8d8;border-radius:18px;padding:5px 10px;font-size:.72rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.7);color:#a070b0;transition:all .2s}
.tag-btn.sel{background:linear-gradient(135deg,#e060a0,#9060d0);border-color:#c040a0;color:#fff}
.weather-row{display:flex;gap:7px;margin-bottom:10px}
.wx-btn{flex:1;border:2px solid #e8b8d8;border-radius:13px;padding:7px 3px;text-align:center;cursor:pointer;background:rgba(255,255,255,.7);transition:all .2s}
.wx-btn.sel{background:linear-gradient(135deg,rgba(96,160,240,.25),rgba(96,200,240,.15));border-color:#70b0f0}
.wx-em{font-size:1.2rem}
.wx-lbl{font-size:.58rem;color:#7090b0;font-weight:700;margin-top:1px}
.diary-inp{width:100%;padding:9px 11px;border:2px solid #e8b8d8;border-radius:12px;font-family:inherit;font-size:.82rem;color:#9060c0;background:rgba(255,255,255,.9);outline:none;resize:none}
.save-btn{width:100%;padding:10px;background:linear-gradient(135deg,#e060a0,#9060d0);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;margin-top:8px;box-shadow:2px 3px 0 #b040a0}
/* 行程 */
.event-row{display:flex;align-items:center;gap:9px;border-radius:13px;padding:9px 12px;margin-bottom:6px;border:1.5px solid #e8b8d8;background:rgba(255,255,255,.68)}
.event-row.done-row{background:rgba(180,240,200,.25);border-color:#80d0a0}
.check-c{width:22px;height:22px;border-radius:50%;border:2.5px solid #e8b8d8;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.check-c.ck{background:linear-gradient(135deg,#80d0a0,#50b070);border-color:#60c080}
.inp{width:100%;padding:9px 11px;border:2px solid #e8b8d8;border-radius:12px;font-family:inherit;font-size:.82rem;color:#9060c0;background:rgba(255,255,255,.9);outline:none}
.add-btn{width:100%;padding:11px;background:linear-gradient(135deg,#e060a0,#9060d0);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;box-shadow:2px 3px 0 #b040a0}
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.inp-lbl{font-size:.63rem;font-weight:700;color:#a070b0;margin-bottom:3px}
/* 橫幅 */
#banners{position:fixed;top:0;left:0;right:0;z-index:200}
.banner{padding:10px 14px;display:flex;align-items:center;gap:10px}
.banner.tomorrow{background:linear-gradient(135deg,#c060a0,#8060c0)}
.banner.soon{background:linear-gradient(135deg,#e05080,#e09030)}
.banner-x{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-weight:900;margin-left:auto;flex-shrink:0}
/* Tab */
.tabbar{display:flex;justify-content:space-around;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:3px dashed #e8b8d8;position:fixed;bottom:0;left:0;right:0;padding:7px 0;z-index:50}
.tb{flex:1;text-align:center;padding:6px 4px;border-radius:14px;border:2px solid transparent;background:none;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:700;color:#b080c0;cursor:pointer}
.tb.on{background:linear-gradient(135deg,#e060a0,#9060d0);color:#fff}
.float{display:inline-block;animation:float 3s ease-in-out infinite}
.deco{text-align:center;margin:4px 0 10px;font-size:1.7rem;letter-spacing:6px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#d0b0c0;font-size:.82rem;padding:14px}
</style>
</head>

function p2(n){return String(n).padStart(2,'0')}

// 解析班次人員（含時間）
function parseShiftPeople(val){
  if(!val||!val.trim())return[];
  return val.split('\n').map(line=>{
    line=line.trim();if(!line)return null;
    // 提取名字和時間
    const tm=line.match(/(\d{1,2}[:.]\d{2})\s*[-~]\s*(\d{1,2}[:.]\d{2})/)||
              line.match(/(\d{3,4})\s*[-:]\s*(\d{3,4})/)||
              line.match(/~?(\d{1,2})\s*[-:]\s*(\d{1,2})/);
    let name=line.replace(/[~]?\d{1,2}[:.:]?\d{0,2}\s*[-~]\s*\d{1,2}[:.:]?\d{0,2}/g,'').replace(/[~]/g,'').trim();
    if(!name)return null;
    const timeStr=tm?tm[0].replace('~','').trim():'';
    return{name,time:timeStr};
  }).filter(Boolean);
}

// 解析球球時間（格式多樣：12:00-16:00 / 12-4 / 14:00-17:30）
function extractBallTime(val){
  if(!val)return null;
  const line=val.split('\n').find(l=>l.includes('球球'));if(!line)return null;
  // 嘗試 HH:MM-HH:MM
  let m=line.match(/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/);
  if(m)return{start:m[1],end:m[2]};
  // 嘗試 HHMM-HHMM
  m=line.match(/(\d{4})\s*[-:]\s*(\d{4})/);
  if(m)return{start:m[1].slice(0,2)+':'+m[1].slice(2),end:m[2].slice(0,2)+':'+m[2].slice(2)};
  // 嘗試 H-H 或 HH-H
  m=line.match(/球球\s*(\d{1,2})\s*[-:]\s*(\d{1,2})/);
  if(m){
    const toT=n=>n.padStart(2,'0')+':00';
    return{start:toT(m[1]),end:toT(m[2])};
  }
  return null;
}

      <div style="font-size:.7rem;color:#9060c0;font-weight:700">⏰ 上班 ${bt?bt.start:'?'} ／ 下班 ${bt?bt.end:'?'}</div>
      ${cwNames.length?`<div style="margin-top:9px;background:rgba(255,255,255,.65);border-radius:12px;padding:7px 12px;border:1.5px solid #e8b8d8">
        <div style="font-size:.58rem;font-weight:900;color:#9060c0;margin-bottom:3px">👯 今天一起上班</div>
        <div style="font-size:.9rem;font-weight:900;color:#c060a0">${cwNames.join(' ・ ')}</div>
      </div>`:''}
    </div>
    <div class="info-grid">
      <div class="info-box">
        <div class="info-icon">👩‍🏫</div>
        <div class="info-lbl">早班是誰</div>
        <div class="info-val ${earlyPpl?'':'dim'}">${earlyPpl||'沒有早班'}</div>
      </div>
      <div class="info-box">
        <div class="info-icon">🔁</div>
        <div class="info-lbl">誰來接班</div>
        <div class="info-val ${nx?'':'dim'}">${nx?nxNames(nx.val):'無接班'}</div>
      </div>
      <div class="info-box full ${isClean?'cleaning':''}">
        <div class="info-icon">${isClean?'🧹':'🤝'}</div>
        <div class="info-lbl">${isClean?'今日清潔提醒':'我接誰的班'}</div>
        <div class="info-val ${isClean?'':''}${!isClean&&!pv?' dim':''}" style="${isClean?'color:#8a5000':''}">
          ${isClean?'🏠 2樓＋3樓 掃地＋拖地':(pv?`接 ${SICON[pv.key]} ${pvNames(pv.val)} 的班`:'今天第一班！')}
        </div>
        ${isClean&&pv?`<div style="font-size:.66rem;color:#9060c0;margin-top:4px">🤝 接 ${SICON[pv.key]} ${pvNames(pv.val)} 的班</div>`:''}
      </div>
    </div>`;
  }
  h+=`</div>`;

  // 全日班表
  if(dd){
    h+=`<div class="card"><div class="sec-lbl">✦ 今日全班表</div>`;
    SHIFTS.forEach(k=>{
      const v=dd[k]||'';if(!v.trim())return;
      const people=parseShiftPeople(v);
      if(!people.length)return;
      const rows=people.map(p=>{
        const isMe=p.name==='球球';
        const nameStr=isMe?`<span class="me-tag">🐾 球球</span>`:p.name;
        const timeStr=p.time?` <span style="font-size:.68rem;color:#a070b0;font-weight:600">${p.time}</span>`:'';
        return`<div>${nameStr}${timeStr}</div>`;
      }).join('');
      h+=`<div class="shift-row">
        <div class="shift-dot" style="background:linear-gradient(135deg,#e060a0,#9060d0)"></div>
        <div class="shift-slot">${SICON[k]} ${k}</div>
        <div class="shift-person">${rows}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  document.getElementById('tab-s').innerHTML=h;
}

function nxNames(val){return val.split('\n').map(l=>l.replace(/[~]?\d{1,2}[:.:]?\d{0,2}\s*[-~:]\s*\d{1,2}[:.:]?\d{0,2}/g,'').replace(/[~]/g,'').trim()).filter(Boolean).join('、')}
function pvNames(val){return nxNames(val)}
function selDay(d){selDate=d;renderS()}
function prevW(){if(curWeekI>0){curWeekI--;selDate=WEEKS[curWeekI].dates[0];renderS()}}
function nextW(){if(curWeekI<WEEKS.length-1){curWeekI++;selDate=WEEKS[curWeekI].dates[0];renderS()}}

// ════ 日曆 ════
function renderC(){
  const days=dim(calY,calM),off=calOff(calY,calM);
  let grid='';
  for(let i=0;i<off;i++)grid+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const k=`${calY}-${p2(calM+1)}-${p2(d)}`;
    const hN=TW_RED[k],isT=TODAY===k;
    const offDay=!isBallWork(k);
    const hasMood=!!(moods[k]&&moods[k].mood);
    const hasEvt=events.some(e=>e.date===k);
    const isSel=selCalDate===k;
    let cls='cal-cell';
    if(isT)cls+=' today';
    else if(hN)cls+=' holiday';
    else if(offDay)cls+=' is-off-cal';
    if(hasMood&&!isT)cls+=' has-mood';
    if(isSel&&!isT)cls+=' selected';
    const moodEm=hasMood?moods[k].mood:'';
    const evDot=hasEvt?`<div style="font-size:.5rem">🦩</div>`:'';
    grid+=`<div class="${cls}" onclick="selCal('${k}')">
      <div class="cal-num">${d}</div>
      <div class="cal-cell-icons">${moodEm}${isT?'🦔':''}${evDot}</div>
    </div>`;
  }

  // 本月節日
  let hList='';
  for(let d=1;d<=days;d++){
    const k=`${calY}-${p2(calM+1)}-${p2(d)}`,hN=TW_RED[k];if(!hN)continue;
    const dow=['一','二','三','四','五','六','日'][new Date(calY,calM,d).getDay()];
    hList+=`<div style="display:flex;align-items:center;gap:10px;background:rgba(255,200,200,.2);border:1.5px solid #ffcccc;border-radius:13px;padding:8px 11px;margin-bottom:5px">
      <div style="font-size:1.2rem">${H_ICON[hN]||'🎌'}</div>
      <div><div style="font-weight:700;color:#d04060;font-size:.8rem">${calM+1}/${d}（${dow}）</div><div style="font-size:.7rem;color:#e87fa0">${hN}</div></div>
    </div>`;
  }

  // 選取日期詳情
  let detailHtml='';
  if(selCalDate){
    const dt=parseD(selCalDate);
    const moodData=moods[selCalDate]||{};
    const dayEvts=events.filter(e=>e.date===selCalDate);
    const ddCal=DATA[selCalDate];
    const ballShift=ddCal?SHIFTS.find(k=>ddCal[k]&&ddCal[k].includes('球球')):null;
    const btCal=ballShift?extractBallTime(ddCal[ballShift]):null;

    detailHtml=`<div class="day-detail">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-family:'Nunito',sans-serif;font-weight:900;color:#c060a0;font-size:1rem">${calM+1}/${dt.getDate()}（${['日','一','二','三','四','五','六'][dt.getDay()]}）</div>
        ${ballShift?`<div style="background:linear-gradient(135deg,rgba(224,96,160,.2),rgba(144,96,208,.15));border-radius:12px;padding:5px 12px;font-size:.78rem;font-weight:700;color:#c060a0">${SICON[ballShift]} ${btCal?btCal.start+'～'+btCal.end:ballShift+'班'}</div>`:`<div style="background:linear-gradient(135deg,#b8e4ff,#7ecfff);border-radius:12px;padding:5px 12px;font-size:.78rem;font-weight:700;color:#1060a0">休假 🌙</div>`}
      </div>
      <!-- 心情記錄 -->
      <div style="font-size:.7rem;font-weight:900;color:#9060c0;margin-bottom:7px">💭 今日心情</div>
      <div class="mood-grid" id="mg-${selCalDate}">${MOODS.map(m=>`<div class="mood-btn${moodData.mood===m.em?' sel':''}" onclick="setMood('${selCalDate}','${m.em}')"><div class="mood-em">${m.em}</div><div class="mood-lbl">${m.lbl}</div></div>`).join('')}</div>
      <div style="font-size:.7rem;font-weight:900;color:#9060c0;margin-bottom:7px">🌤 天氣</div>
      <div class="weather-row" id="wx-${selCalDate}">${WEATHERS.map(w=>`<div class="wx-btn${moodData.weather===w.em?' sel':''}" onclick="setWx('${selCalDate}','${w.em}')"><div class="wx-em">${w.em}</div><div class="wx-lbl">${w.lbl}</div></div>`).join('')}</div>
      <div style="font-size:.7rem;font-weight:900;color:#9060c0;margin-bottom:7px">✨ 今天做了什麼</div>
      <div class="tag-row" id="tg-${selCalDate}">${TAGS.map(t=>{const sel=(moodData.tags||[]).includes(t);return`<div class="tag-btn${sel?' sel':''}" onclick="togTag('${selCalDate}','${t}')">${t}</div>`}).join('')}</div>
      <div style="font-size:.7rem;font-weight:900;color:#9060c0;margin-bottom:5px">📝 小日記</div>
      <textarea class="diary-inp" rows="3" id="diary-${selCalDate}" placeholder="今天發生了什麼？隨便寫幾個字就好 🌸" onchange="saveDiary('${selCalDate}',this.value)">${moodData.diary||''}</textarea>
      ${dayEvts.length?`<div style="margin-top:10px;font-size:.7rem;font-weight:900;color:#9060c0;margin-bottom:6px">📌 今日行程</div>${dayEvts.map(e=>`<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.7);border:1.5px solid #e8b8d8;border-radius:11px;padding:7px 10px;margin-bottom:5px"><div style="font-size:.9rem">${e.done?'✅':'📌'}</div><div style="font-size:.78rem;font-weight:700;color:#c060a0">${e.time?e.time+' ':''} ${e.title}</div></div>`).join('')}`:''}
      <button class="save-btn" onclick="saveMoodAll('${selCalDate}')">🌸 儲存今日記錄</button>
    </div>`;
  }

  document.getElementById('tab-c').innerHTML=`
  <div class="deco">${['🌙','⭐','💫','⭐','🌙'].map((e,i)=>`<span class="float" style="animation-delay:${i*.3}s">${e}</span>`).join('')}</div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="nav-btn" onclick="calPrev()">‹</button>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;color:#c060a0;font-size:1rem">🌸 ${calY}年 ${calM+1}月</div>
      <button class="nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" style="margin-bottom:3px">${['日','一','二','三','四','五','六'].map((d,i)=>`<div style="font-size:.58rem;font-weight:700;color:${i===0||i===6?'#c060a0':'#9060c0'};text-align:center;padding:2px 0">${d}</div>`).join('')}</div>
    <div class="cal-grid">${grid}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:.6rem;font-weight:700;color:#9060c0">
      <span style="color:#c060a0">♦️ 今天</span><span style="color:#98e8b0">🍀 有心情</span><span style="color:#60b0e8">🤱 休假</span><span>📌 有行程</span>
    </div>
    ${detailHtml}
  </div>
  ${hList?`<div class="card"><div class="sec-lbl">🎌 ${calM+1}月節假日</div>${hList}</div>`:''}`;
}

function selCal(k){selCalDate=selCalDate===k?'':k;renderC();}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}selCalDate='';renderC();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}selCalDate='';renderC();}

// 心情儲存
function saveMoods(){try{localStorage.setItem('bb_mood',JSON.stringify(moods))}catch{}}
function setMood(d,em){
  if(!moods[d])moods[d]={};
  moods[d].mood=moods[d].mood===em?'':em;
  saveMoods();renderC();
}
function setWx(d,em){
  if(!moods[d])moods[d]={};
  moods[d].weather=moods[d].weather===em?'':em;
  saveMoods();renderC();
}
function togTag(d,t){
  if(!moods[d])moods[d]={};
  if(!moods[d].tags)moods[d].tags=[];
  const i=moods[d].tags.indexOf(t);
  if(i>=0)moods[d].tags.splice(i,1);else moods[d].tags.push(t);
  saveMoods();renderC();
}
function saveDiary(d,txt){if(!moods[d])moods[d]={};moods[d].diary=txt;saveMoods();}
function saveMoodAll(d){
  const ta=document.getElementById('diary-'+d);
  if(ta&&moods[d])moods[d].diary=ta.value;
  saveMoods();
  // 顯示小提示
  const btn=event.target;btn.textContent='✅ 儲存成功！';
  setTimeout(()=>{btn.textContent='🌸 儲存今日記錄'},1500);
}

// ════ 行程 ════
function saveEvts(){try{localStorage.setItem('bb_ev',JSON.stringify(events))}catch{}}
function addEvt(){
  const d=document.getElementById('ev-d').value,ti=document.getElementById('ev-t').value,ttl=document.getElementById('ev-ttl').value;
  if(!d||!ttl)return;
  events.push({id:Date.now(),date:d,time:ti,title:ttl,done:false});
  events.sort((a,b)=>a.date.localeCompare(b.date));
  saveEvts();renderP();checkBanners();
}
function delEvt(id){events=events.filter(e=>e.id!==id);saveEvts();renderP();checkBanners();}
function togDone(id){const e=events.find(e=>e.id===id);if(e)e.done=!e.done;saveEvts();renderP();}

function renderP(){
  const tmr=d2s(new Date(parseD(TODAY).getTime()+86400000));
  const todayEvs=events.filter(e=>e.date===TODAY);
  const tmrEvs=events.filter(e=>e.date===tmr);
  let h=`<div class="deco">${['🌺','🐝','🌻','🐝','🌺'].map((e,i)=>`<span class="float" style="animation-delay:${i*.3}s">${e}</span>`).join('')}</div>`;

  if(tmrEvs.length)h+=`<div class="card" style="border-color:#e060a0;background:linear-gradient(135deg,rgba(224,96,160,.1),rgba(144,96,208,.07))">
    <div class="sec-lbl">🔔 明天的提醒</div>${tmrEvs.map(e=>`<div class="event-row" style="border-color:#e8b8d8"><div style="font-size:1rem">🗓️</div><div style="flex:1"><div style="font-weight:700;font-size:.82rem;color:#c060a0">${e.time?e.time+' ':''}${e.title}</div><div style="font-size:.63rem;color:#9060c0">${e.date}</div></div></div>`).join('')}
  </div>`;

  if(todayEvs.length)h+=`<div class="card"><div class="sec-lbl">⭐ 今天的行程</div>${todayEvs.map(e=>`<div class="event-row${e.done?' done-row':''}">
    <div class="check-c${e.done?' ck':''}" onclick="togDone(${e.id})">${e.done?'<span style="color:#fff;font-size:.7rem;font-weight:900">✓</span>':''}</div>
    <div style="flex:1"><div style="font-weight:700;font-size:.82rem;color:${e.done?'#60a070':'#c060a0'};text-decoration:${e.done?'line-through':'none'}">${e.time?e.time+' ':''}${e.title}</div></div>
    <button class="del-btn" style="color:#e8b8d8" onclick="delEvt(${e.id})">✕</button>
  </div>`).join('')}</div>`;

  h+=`<div class="card"><div class="sec-lbl">📝 新增行程</div>
    <div class="inp-grid">
      <div><div class="inp-lbl">📅 日期 *</div><input class="inp" type="date" id="ev-d"></div>
      <div><div class="inp-lbl">⏰ 時間</div><input class="inp" type="time" id="ev-t"></div>
    </div>
    <div style="margin-bottom:10px"><div class="inp-lbl">🌸 事情 *</div><input class="inp" type="text" id="ev-ttl" placeholder="例：看醫生、約朋友…"></div>
    <button class="add-btn" onclick="addEvt()">🌸 加入行程</button>
  </div>
  <div class="card"><div class="sec-lbl">📋 所有行程</div>
    ${events.length?events.map(e=>{
      const isPast=e.date<TODAY,isT=e.date===TODAY;
      return`<div class="event-row${e.done?' done-row':isT?' ':''}" style="opacity:${isPast&&!e.done?.6:1};border-color:${isT?'#c060a0':'#e8b8d8'}">
        <div class="check-c${e.done?' ck':''}" onclick="togDone(${e.id})">${e.done?'<span style="color:#fff;font-size:.7rem;font-weight:900">✓</span>':''}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:.8rem;color:${e.done?'#60a070':isPast?'#b090a0':'#c060a0'};text-decoration:${e.done?'line-through':'none'}">${e.time?e.time+' ':''}${e.title}</div>
          <div style="font-size:.62rem;color:#9060c0">${e.date}${isT?' 今天':''}${e.done?' ✨完成':''}</div>
        </div>
        <button style="background:none;border:none;color:#e8b8d8;cursor:pointer;font-weight:900" onclick="delEvt(${e.id})">✕</button>
      </div>`;
    }).join(''):`<div class="empty">還沒有行程，快加入吧 🌸</div>`}
  </div>`;
  document.getElementById('tab-p').innerHTML=h;
}

// ════ 橫幅 ════
function checkBanners(){
  const now=new Date(),tmr=d2s(new Date(now.getTime()+86400000)),bs=[];
  events.filter(e=>e.date===tmr).forEach(e=>bs.push({...e,type:'tomorrow'}));
  events.filter(e=>{
    if(e.date!==TODAY||!e.time)return false;
    const[h,m]=e.time.split(':').map(Number);
    return(h*60+m)-(now.getHours()*60+now.getMinutes())>0&&(h*60+m)-(now.getHours()*60+now.getMinutes())<=60;
  }).forEach(e=>bs.push({...e,type:'soon'}));
  const el=document.getElementById('banners');
  el.innerHTML=bs.map(b=>`<div class="banner ${b.type}">
    <div style="font-size:1.2rem">${b.type==='soon'?'⏰':'🔔'}</div>
    <div style="flex:1">
      <div style="font-weight:900;color:#fff;font-size:.82rem">${b.type==='soon'?'⚡ 一小時後！':'🌸 明天有行程'}</div>
      <div style="color:rgba(255,255,255,.9);font-size:.74rem">${b.time?b.time+' ':''}${b.title}</div>
    </div>
    <button class="banner-x" onclick="this.parentElement.remove();updateHdr()">✕</button>
  </div>`).join('');
  updateHdr();
}
function updateHdr(){
  document.getElementById('hdr').style.top=document.getElementById('banners').children.length*46+'px';
}
</script>
</body>
</html>
