<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>熙雅愛情日記 💕</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pk:#ff6b9d;--pk2:#ff8fab;--pk3:#ffb3c6;--pk4:#ffeef4;--pk5:#fff5f8;
  --sky:#4dabf7;--sky2:#74c0fc;--sky3:#a5d8ff;--sky4:#e7f5ff;
  --pur:#cc5de8;--pur2:#e599f7;--pur3:#f3d9fa;
  --txt:#2d1b2e;--txt2:#6b3a5a;--txt3:#a06080;--txt4:#c49ab0;
  --white:#fff;--bg:#fff5f8;
  --grad:linear-gradient(135deg,#ff8fab 0%,#cc5de8 50%,#74c0fc 100%);
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Segoe UI',sans-serif;color:var(--txt);overflow:hidden}
.app{max-width:430px;height:100vh;max-height:900px;margin:0 auto;display:flex;flex-direction:column;background:var(--white);overflow:hidden}
@media(min-width:500px){.app{border-radius:36px;margin:20px auto;box-shadow:0 20px 60px #ff8fab40}}
/* Header */
.app-header{background:var(--grad);padding:max(env(safe-area-inset-top),10px) 16px 12px;flex-shrink:0}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.app-title{color:#fff;font-size:17px;font-weight:700;letter-spacing:.5px}
.header-date{color:rgba(255,255,255,.8);font-size:11px;margin-top:1px}
.couple-avs{display:flex;align-items:center;gap:4px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);color:#fff;font-weight:700}
/* Tabs */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #fce4ec;flex-shrink:0;padding:0 2px}
.tab{flex:1;padding:8px 2px 6px;text-align:center;cursor:pointer;border-bottom:2.5px solid transparent;transition:.2s;user-select:none}
.tab.active{border-bottom-color:var(--pk)}
.tab-ico{font-size:19px;line-height:1.2}
.tab-lbl{font-size:9px;color:var(--txt3);margin-top:1px;font-weight:500}
.tab.active .tab-lbl{color:var(--pk)}
/* Page */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.page-inner{padding:14px 14px 90px}
/* ── SHIFT ── */
.shift-hero{background:var(--grad);border-radius:20px;padding:18px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
.shift-hero::before{content:'💕';position:absolute;right:10px;top:6px;font-size:56px;opacity:.12;transform:rotate(-10deg)}
.sh-label{font-size:10px;opacity:.85;margin-bottom:4px}
.sh-time{font-size:30px;font-weight:900;letter-spacing:.5px;margin:2px 0}
.sh-date{font-size:11px;opacity:.8}
/* same-shift big display inside hero */
.same-block{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.3)}
.same-block-lbl{font-size:10px;opacity:.8;margin-bottom:8px}
.same-names{display:flex;flex-wrap:wrap;gap:6px}
.same-name-chip{background:rgba(255,255,255,.25);border-radius:12px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:1px}
.snc-name{font-size:16px;font-weight:800}
.snc-time{font-size:10px;opacity:.8}
/* coworker box */
.cw-box{background:#fff;border-radius:16px;padding:12px;border:1.5px solid var(--pk3);margin-bottom:12px}
.cw-box-title{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:8px}
.cw-group{margin-bottom:8px}
.cw-group:last-child{margin-bottom:0}
.cw-group-lbl{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;margin-bottom:5px;display:inline-block}
.cw-group-lbl.same{background:#ffe0ea;color:#c2335a}
.cw-group-lbl.early{background:#fff3bf;color:#7c5700}
.cw-group-lbl.late{background:#d3f9d8;color:#2b8a3e}
.cw-group-lbl.night{background:#e5dbff;color:#5f3dc4}
.cw-rows{display:flex;flex-direction:column;gap:4px}
.cw-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;background:var(--pk5)}
.cw-row.same-row{background:linear-gradient(90deg,#fff0f3,#f3d9fa)}
.cw-ico{font-size:13px;width:20px;text-align:center}
.cw-name{font-size:12px;font-weight:600;color:var(--txt2);flex:1}
.cw-time{font-size:11px;color:var(--txt3)}
/* week section */
.week-section{background:#fff;border-radius:16px;overflow:hidden;border:1.5px solid var(--pk3)}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--pk4)}
.wn-btn{background:var(--pk4);border:none;border-radius:14px;padding:4px 11px;color:var(--pk);font-size:13px;cursor:pointer;font-weight:700}
.wn-lbl{font-size:12px;font-weight:600;color:var(--txt2)}
.week-day{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--pk4);cursor:pointer;transition:.15s}
.week-day:last-child{border-bottom:none}
.week-day:hover{background:var(--pk5)}
.week-day.today{background:linear-gradient(90deg,#fff0f3,#fff)}
.wd-left{min-width:62px}
.wd-name{font-size:12px;font-weight:600;color:var(--txt2)}
.wd-date{font-size:10px;color:var(--txt3)}
.wd-shifts{display:flex;flex-wrap:wrap;gap:3px;flex:1;justify-content:flex-end}
.ws-tag{font-size:9px;padding:2px 7px;border-radius:7px;font-weight:500}
.ws-tag.me{background:var(--grad);color:#fff}
.ws-tag.peer{background:var(--sky4);color:#1971c2}
.ws-tag.off{background:var(--pk4);color:var(--txt4)}
/* day modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:16px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--pk4);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;color:var(--pk)}
.modal-group{margin-bottom:10px}
.modal-group-lbl{font-size:10px;font-weight:700;padding:2px 9px;border-radius:8px;margin-bottom:5px;display:inline-block}
.modal-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:var(--pk5);margin-bottom:3px}
.modal-row.same-row{background:linear-gradient(90deg,#fff0f3,#f3d9fa)}
.mr-ico{font-size:14px;width:22px;text-align:center}
.mr-name{font-size:13px;font-weight:600;color:var(--txt2);flex:1}
.mr-time{font-size:11px;color:var(--txt3)}
/* ── CALENDAR ── */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cmn-btn{background:var(--pk4);border:none;border-radius:14px;padding:4px 13px;color:var(--pk);font-size:14px;font-weight:700;cursor:pointer}
.cmn-lbl{font-size:18px;font-weight:700;color:var(--txt)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-dow div{text-align:center;font-size:10px;font-weight:600;color:var(--txt3);padding:3px 0}
.cal-dow .sun{color:#e03131}.cal-dow .sat{color:var(--sky)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;cursor:pointer;position:relative;transition:.15s}
.cal-cell:not(.empty):hover{background:var(--pk4)}
.cal-cell.empty{pointer-events:none}
.cal-cell.today{background:var(--grad);color:#fff}
.cal-cell.today .cc-num{color:#fff!important;font-weight:800}
.cal-cell.selected:not(.today){outline:2px solid var(--pk);outline-offset:1px}
.cal-cell.holiday .cc-num{color:#e03131;font-weight:600}
.cal-cell.sat .cc-num{color:#1971c2}
.cc-num{font-size:13px;font-weight:500;line-height:1}
.cc-ico{font-size:9px;line-height:1}
.cc-dots{position:absolute;bottom:2px;display:flex;gap:2px}
.cc-dot{width:4px;height:4px;border-radius:50%}
.cc-dot.mood{background:var(--pk)}
.cc-dot.sched{background:var(--sky)}
.holiday-banner{background:linear-gradient(90deg,#fff0f3,#f3d9fa);border-radius:10px;padding:7px 11px;margin-bottom:10px;font-size:11px;color:var(--txt2);border:1px solid var(--pk3)}
/* Mood diary */
.mood-diary{background:#fff;border-radius:18px;border:1.5px solid var(--pk3);overflow:hidden;margin-bottom:10px}
.md-hdr{background:var(--grad);padding:11px 14px;color:#fff}
.md-hdr-title{font-size:13px;font-weight:700}
.md-hdr-sub{font-size:10px;opacity:.8;margin-top:1px}
.md-body{padding:12px}
.md-sides{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.md-side{border-radius:12px;padding:10px;border:1.5px solid}
.md-side.xi{border-color:var(--sky2);background:var(--sky4)}
.md-side.ya{border-color:var(--pk2);background:var(--pk4)}
.md-side-title{font-size:11px;font-weight:700;margin-bottom:8px}
.md-side.xi .md-side-title{color:#1971c2}
.md-side.ya .md-side-title{color:#c2335a}
.md-sec-lbl{font-size:9px;color:var(--txt3);font-weight:600;margin-bottom:4px}
.mood-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.mchip{font-size:10px;padding:3px 6px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:.12s;user-select:none}
.mchip.xi{border-color:var(--sky2);color:#1864ab;background:#fff}
.mchip.xi.sel{background:var(--sky2);color:#fff;border-color:var(--sky)}
.mchip.ya{border-color:var(--pk2);color:#c2335a;background:#fff}
.mchip.ya.sel{background:var(--pk2);color:#fff;border-color:var(--pk)}
.photo-area{margin-top:6px}
.photo-btn{width:100%;padding:7px;border-radius:9px;border:1.5px dashed;cursor:pointer;font-size:10px;text-align:center;background:transparent;transition:.15s}
.photo-btn.xi{border-color:var(--sky2);color:#1864ab}
.photo-btn.ya{border-color:var(--pk2);color:#c2335a}
.mood-note{width:100%;min-height:68px;padding:7px 9px;border-radius:9px;border:1.5px solid;font-size:12px;font-family:inherit;color:var(--txt);background:#fff;resize:vertical;line-height:1.5;margin-bottom:4px}
.mood-note.xi-note{border-color:var(--sky2);background:var(--sky4)}
.mood-note.ya-note{border-color:var(--pk2);background:var(--pk4)}
.mood-note:focus{outline:none;border-color:var(--pk)}
.photo-prev{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.photo-thumb{width:42px;height:42px;border-radius:7px;object-fit:cover;border:1.5px solid var(--pk3);cursor:pointer}
.md-save{width:100%;margin-top:10px;background:var(--grad);color:#fff;border:none;border-radius:12px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
/* ── SCHEDULE ── */
.sched-tabs{display:flex;gap:6px;margin-bottom:12px}
.stab{flex:1;padding:7px;border-radius:10px;border:1.5px solid var(--pk3);text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--txt3);transition:.2s}
.stab.active{background:var(--grad);color:#fff;border-color:transparent}
.add-sched-btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:14px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px}
.add-form{background:#fff;border-radius:16px;padding:12px;border:1.5px solid var(--pk3);margin-bottom:12px}
.af-title{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:10px}
.af-lbl{font-size:10px;color:var(--txt3);font-weight:600;margin-bottom:4px}
.af-row{margin-bottom:8px}
.af-who{display:flex;gap:5px}
.who-btn{flex:1;padding:6px;border-radius:9px;border:1.5px solid;font-size:11px;cursor:pointer;font-weight:600;transition:.2s;background:transparent}
.who-btn.b{border-color:var(--sky2);color:#1971c2}
.who-btn.b.sel{background:var(--sky3);border-color:var(--sky)}
.who-btn.g{border-color:var(--pk2);color:#c2335a}
.who-btn.g.sel{background:var(--pk3);border-color:var(--pk)}
.who-btn.t{border-color:var(--pur2);color:#862e9c}
.who-btn.t.sel{background:var(--pur3);border-color:var(--pur)}
.sticker-cats{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:6px}
.sticker-cats::-webkit-scrollbar{display:none}
.scat{font-size:10px;padding:3px 9px;border-radius:9px;border:1px solid var(--pk3);cursor:pointer;white-space:nowrap;background:var(--pk5);color:var(--txt2);flex-shrink:0}
.scat.active{background:var(--pk);color:#fff;border-color:var(--pk)}
.sticker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.stk{font-size:21px;text-align:center;cursor:pointer;padding:3px 2px;border-radius:7px;border:2px solid transparent;transition:.12s;line-height:1.2}
.stk:hover{background:var(--pk4);transform:scale(1.1)}
.stk.sel{border-color:var(--pk);background:var(--pk4)}
.custom-emoji-row{display:none;align-items:center;gap:5px;margin-top:5px}
.af-input{width:100%;padding:7px 10px;border-radius:9px;border:1.5px solid var(--pk3);font-size:13px;color:var(--txt);background:var(--pk5)}
.af-input:focus{outline:none;border-color:var(--pk)}
.af-2col{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.af-save{width:100%;background:var(--grad);color:#fff;border:none;border-radius:11px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.sched-list{display:flex;flex-direction:column;gap:7px}
.sched-item{background:#fff;border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:9px;border:1px solid var(--pk3);border-left:4px solid}
.sched-item.b{border-left-color:var(--sky)}
.sched-item.g{border-left-color:var(--pk)}
.sched-item.t{border-left-color:var(--pur)}
.si-ico{font-size:24px;line-height:1;flex-shrink:0}
.si-body{flex:1;min-width:0}
.si-title{font-size:12px;font-weight:600;color:var(--txt)}
.si-meta{font-size:10px;color:var(--txt3);margin-top:1px}
.si-badge{font-size:9px;padding:2px 7px;border-radius:7px;font-weight:600;flex-shrink:0}
.si-badge.b{background:var(--sky4);color:#1864ab}
.si-badge.g{background:var(--pk4);color:#c2335a}
.si-badge.t{background:var(--pur3);color:#862e9c}
.si-del{background:none;border:none;font-size:15px;cursor:pointer;color:var(--txt4);padding:3px}
.si-edit-btn{background:none;border:none;font-size:14px;cursor:pointer;color:var(--sky);padding:3px}
.si-done-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:3px;opacity:.7}
.si-done-btn.done{opacity:1}
.si-actions{display:flex;align-items:center;gap:1px;flex-shrink:0}
.sched-done{background:#f5f5f5!important;border-color:#ddd!important;border-left-color:#ccc!important}
.sec-lbl{font-size:11px;font-weight:600;color:var(--txt3);margin:10px 0 6px}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty-state .es-ico{font-size:48px;margin-bottom:8px}
/* ── ANNIVERSARY ── */
.anni-hero{background:var(--grad);border-radius:20px;padding:18px;color:#fff;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.anni-hero::before{content:'💍';position:absolute;right:12px;top:8px;font-size:52px;opacity:.14}
.anni-days{font-size:50px;font-weight:900;line-height:1}
.anni-sub{font-size:11px;opacity:.85;margin-top:3px}
.anni-couple{font-size:13px;font-weight:600;margin-top:7px;opacity:.9}
.anni-next{background:rgba(255,255,255,.2);border-radius:10px;padding:7px 12px;margin-top:9px;font-size:11px}
.anni-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.anni-card{background:#fff;border-radius:14px;padding:12px;border:1.5px solid var(--pk3);display:flex;align-items:center;gap:10px}
.anni-card-ico{font-size:26px;flex-shrink:0}
.anni-card-body{flex:1;min-width:0}
.anni-card-name{font-size:12px;font-weight:600;color:var(--txt)}
.anni-card-date{font-size:10px;color:var(--txt3);margin-top:2px}
.anni-card-next{font-size:10px;color:var(--pk);margin-top:2px}
.anni-card-right{text-align:right;flex-shrink:0}
.anni-days-num{font-size:20px;font-weight:800;color:var(--pk)}
.anni-days-lbl{font-size:9px;color:var(--txt3)}
.anni-stk{font-size:21px;cursor:pointer;padding:3px 4px;border-radius:7px;border:2px solid transparent;transition:.12s;display:inline-block}
.anni-stk:hover{background:var(--pk4);transform:scale(1.1)}
.anni-stk.sel{border-color:var(--pk);background:var(--pk4)}
.milestone-box{background:var(--pk4);border-radius:12px;padding:11px 13px;font-size:11px;color:var(--txt2);line-height:1.9}
/* ── LOADING ── */
.loading{position:fixed;inset:0;background:linear-gradient(135deg,#ffeef4 0%,#f3d9fa 50%,#e7f5ff 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:.4s}
.loading.hide{opacity:0;pointer-events:none}
.loading-ico{font-size:60px;animation:pulse 1s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}
.loading-txt{font-size:15px;font-weight:700;color:var(--pk);margin-top:14px}
.loading-sub{font-size:11px;color:var(--txt3);margin-top:5px}
/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(45,27,46,.9);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="loading" id="loading">
  <div class="loading-ico">💕</div>
  <div class="loading-txt">熙雅愛情日記</div>
  <div class="loading-sub">載入中，請稍候...</div>
</div>

<div class="app">
  <div class="app-header">
    <div class="header-inner">
      <div>
        <div class="app-title">💕 熙雅愛情日記</div>
        <div class="header-date" id="hdr-date"></div>
      </div>
      <div class="couple-avs">
        <div class="av" style="background:rgba(116,192,252,.5)">熙</div>
        <div style="color:#fff;font-size:13px">♡</div>
        <div class="av" style="background:rgba(255,107,157,.5)">雅</div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('shift',this)"><div class="tab-ico">🗓</div><div class="tab-lbl">班表</div></div>
    <div class="tab" onclick="switchTab('cal',this)"><div class="tab-ico">📅</div><div class="tab-lbl">日歷</div></div>
    <div class="tab" onclick="switchTab('sched',this)"><div class="tab-ico">💌</div><div class="tab-lbl">行程</div></div>
    <div class="tab" onclick="switchTab('anni',this)"><div class="tab-ico">💍</div><div class="tab-lbl">紀念日</div></div>
  </div>
  <div class="page" id="page"></div>
</div>

<div id="day-modal"></div>
<div class="toast" id="toast"></div>
<input type="file" id="xi-photo-inp" accept="image/*" multiple onchange="handlePhoto('xi',this)">
<input type="file" id="ya-photo-inp" accept="image/*" multiple onchange="handlePhoto('ya',this)">
<input type="file" id="custom-img-inp" accept="image/*" onchange="addCustomImg(this)">

<script>
// ══════════════════════════════════════════
//  SUPABASE — public anon key (safe for client)
// ══════════════════════════════════════════
const SUPA_URL = 'https://raupmwembebxoxzmdppe.supabase.co';
const SUPA_KEY = 'sb_publishable_84WIu59Amgf_k0GVIJZ4Ow_ivEBpZRR';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════
//  SHIFT DATA (from xlsx)
// ══════════════════════════════════════════
const SHIFTS = {

async function loadAll(){
  // Load all shared data — visible to everyone who opens this page
  const [r1,r2,r3] = await Promise.all([
    db.from('moods').select('*'),
    db.from('schedules').select('*').order('date_key'),
    db.from('anniversaries').select('*').order('date')
  ]);
  if(!r1.error && r1.data) r1.data.forEach(r => { moodState[r.date] = r; });
  if(!r2.error && r2.data) schedItems = r2.data;
  if(!r3.error && r3.data) anniItems = r3.data;
  if(r1.error) console.warn('moods load error', r1.error);
  if(r2.error) console.warn('schedules load error', r2.error);
  if(r3.error) console.warn('anniversaries load error', r3.error);
}

async function upsertMood(dateKey, payload){
  // payload arrays must be plain JS arrays (not stringified) for jsonb columns
  const { data, error } = await db.from('moods')
    .upsert({ date: dateKey, ...payload }, { onConflict: 'date' })
    .select().single();
  if(error){
    console.error('upsertMood:', error);
    toast('❌ 日記失敗：' + (error.message || error.code || JSON.stringify(error)));
    return false;
  }
  moodState[dateKey] = { ...moodState[dateKey], ...data, date: dateKey };
  toast('💕 日記已儲存！');
  return true;
}

async function insertSchedule(item){
  const { data, error } = await db.from('schedules').insert(item).select().single();
  if(error){
    console.error('insertSchedule:', error);
    toast('❌ 行程失敗：' + (error.message || error.code || JSON.stringify(error)));
    return null;
  }
  schedItems.push(data);
  toast('💌 行程已記錄！');
  return data;
}

async function deleteSchedule(id){

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function toMin(t){
  if(!t) return -1;
  const m = t.match(/(\d{1,2})[:\.]?(\d{2})/);
  return m ? parseInt(m[1])*60 + parseInt(m[2]) : -1;
}
function classifyCW(cwStr, ballStart, ballEnd){
  const m = cwStr.match(/(\d{1,2})[:\.](\d{2})-(\d{1,2})[:\.](\d{2})/);
  if(!m) return 'same'; // no time = assume same
  const ws = parseInt(m[1])*60+parseInt(m[2]);
  const we = parseInt(m[3])*60+parseInt(m[4]);
  // overlaps?
  if(ws < ballEnd && we > ballStart) return 'same';
  if(we <= ballStart) return 'early';
  return 'late';
}

function getWeekDays(offset){
  const base = new Date(2026,3,13); // week of Apr 13
  const mon = new Date(base);
  mon.setDate(base.getDate() + offset*7);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    days.push({mo:d.getMonth()+1, da:d.getDate(), dow:i});
  }
  return days;
}

function toggleChip(date,who,type,val){
  if(!moodState[date]) moodState[date]={};
  const key=`${who}_${type}`;
  if(!moodState[date][key]) moodState[date][key]=[];
  const arr=moodState[date][key], i=arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  render();
}

async function saveMoodEntry(dateKey){
  const btn = document.getElementById('md-save-btn');
  if(btn){btn.disabled=true;btn.textContent='儲存中...'}
  // Read free-text notes directly from DOM before render clears them
  const xiNote = document.getElementById('xi-note-'+dateKey)?.value ?? (moodState[dateKey]?.xi_note||'');
  const yaNote = document.getElementById('ya-note-'+dateKey)?.value ?? (moodState[dateKey]?.ya_note||'');
  // Update local state with note
  if(!moodState[dateKey]) moodState[dateKey]={};
  moodState[dateKey].xi_note = xiNote;
  moodState[dateKey].ya_note = yaNote;
  const e = moodState[dateKey];
  // Send plain JS arrays — Supabase JS handles jsonb conversion automatically
  const payload = {
    xi_feeling:  Array.isArray(e.xi_feeling)  ? e.xi_feeling  : [],
    xi_body:     Array.isArray(e.xi_body)     ? e.xi_body     : [],
    xi_activity: Array.isArray(e.xi_activity) ? e.xi_activity : [],
    xi_note:     xiNote,
    ya_feeling:  Array.isArray(e.ya_feeling)  ? e.ya_feeling  : [],
    ya_body:     Array.isArray(e.ya_body)     ? e.ya_body     : [],
    ya_activity: Array.isArray(e.ya_activity) ? e.ya_activity : [],
    ya_note:     yaNote,
    xi_photos:   JSON.stringify(xiPhotos[dateKey]||[]),
    ya_photos:   JSON.stringify(yaPhotos[dateKey]||[])
  };
  const ok = await upsertMood(dateKey, payload);
  if(ok){ render(); } else {
    if(btn){btn.disabled=false;btn.textContent='💾 儲存今天的日記'}
  }
}

function handlePhoto(who, inp){
  // Capture dateKey BEFORE any async — inp.dataset.date set at click time
  const dateKey = inp.dataset.date || selDate || todayKey();
  const files = Array.from(inp.files);
  if(!files.length) return;
  inp.value = ''; // reset immediately so same file can be re-selected

  const store = who==='xi' ? xiPhotos : yaPhotos;
  if(!store[dateKey]) store[dateKey] = [];

  // Show immediate feedback
  toast('📷 上傳中...');

  // Read all files then render once
  const promises = files.map(f => new Promise((resolve, reject) => {
    // Check file size — skip if too large (>2MB)
    if(f.size > 2*1024*1024){
      toast('⚠ 圖片太大，請選小於 2MB 的圖');
      resolve(null); return;
    }
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = () => { toast('❌ 讀取圖片失敗'); resolve(null); };
    r.readAsDataURL(f);
  }));

  Promise.all(promises).then(results => {
    results.forEach(url => { if(url) store[dateKey].push(url); });
    // Preserve note content across render
    const xiNote = document.getElementById('xi-note-'+dateKey)?.value || '';
    const yaNote = document.getElementById('ya-note-'+dateKey)?.value || '';
    if(!moodState[dateKey]) moodState[dateKey]={};
    moodState[dateKey].xi_note = xiNote;
    moodState[dateKey].ya_note = yaNote;
    render();
  });
}
function removePhoto(who,dateKey,idx){
  const s=who==='xi'?xiPhotos:yaPhotos;
  if(s[dateKey]) s[dateKey].splice(idx,1);
  render();
}

async function submitSched(){
  syncSchedInputs();
  const {title,date:dv,time,who,sticker}=addSF;
  if(!title.trim()){ toast('請輸入行程名稱！'); return; }
  if(!dv){ toast('請選擇日期！'); return; }
  const p=dv.split('-');
  const dateKey=p[1]+p[2];

  if(editingId){
    // UPDATE existing schedule
    const { error } = await db.from('schedules')
      .update({who,sticker,title:title.trim(),date_key:dateKey,time})
      .eq('id', editingId);
    if(error){ toast('❌ 更新失敗：'+error.message); return; }
    const idx = schedItems.findIndex(x=>x.id===editingId);
    if(idx>-1) schedItems[idx]={...schedItems[idx],who,sticker,title:title.trim(),date_key:dateKey,time};
    toast('✏️ 行程已更新！');
    editingId = null;
  } else {
    // INSERT new schedule
    const item={who,sticker,title:title.trim(),date_key:dateKey,time,completed:false,created_at:new Date().toISOString()};
    await insertSchedule(item);
  }
  addSF={who:'t',sticker:'💕',stickerCat:'愛心',title:'',date:'',time:''};
  showAddSched=false; render();
}

async function toggleDone(id){
  const s = schedItems.find(x=>x.id===id);
  if(!s) return;
  const newVal = !s.completed;
  const { error } = await db.from('schedules').update({completed: newVal}).eq('id', id);
  if(error){ toast('❌ 更新失敗：'+error.message); return; }
  s.completed = newVal;
  toast(newVal ? '✅ 已完成！' : '↩ 標記為未完成');
  render();
}

let editingId = null;
function editSched(id){
  const s = schedItems.find(x=>x.id===id);
  if(!s) return;
  editingId = id;
  const ds = s.date_key ? '2026-'+s.date_key.slice(0,2)+'-'+s.date_key.slice(2) : '';
  addSF = {who:s.who||'t', sticker:s.sticker||'💕', stickerCat:'愛心', title:s.title||'', date:ds, time:s.time||''};
  showAddSched = true;
  render();
  setTimeout(()=>document.getElementById('add-sched-form')?.scrollIntoView({behavior:'smooth',block:'start'}), 80);
}

async function delSched(id){
  if(!id){ toast('無法刪除'); return; }
  await deleteSchedule(id); render();
}

function daysBetween(ds){
  const [y,m,d]=ds.split('-').map(Number);
  const diff=(new Date(2026,3,9)-new Date(y,m-1,d))/(864e5);
  return Math.floor(diff);
}
function nextAnniv(ds){
  const [,m,d]=ds.split('-').map(Number);
  const today=new Date(2026,3,9);
  let nx=new Date(2026,m-1,d);
  if(nx<=today) nx=new Date(2027,m-1,d);
  return {label:`${nx.getMonth()+1}/${nx.getDate()}`, days:Math.floor((nx-today)/864e5)};
}

  const date = document.getElementById('a-date')?.value||'';
  if(!name){ toast('請輸入名稱！'); return; }
  if(!date){ toast('請選擇日期！'); return; }
  insertAnniversary({name,date,sticker:addAF.sticker,created_at:new Date().toISOString()}).then(()=>{
    addAF={name:'',date:'',sticker:'💕'}; showAddAnni=false; render();
  });
}
async function delAnni(id){
  await deleteAnniversary(id); render();
}

async function init(){
  const now=new Date();
  document.getElementById('hdr-date').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  selDate=todayKey();
  await loadAll();
  render();
  document.getElementById('loading').classList.add('hide');
}
init();
</script>
