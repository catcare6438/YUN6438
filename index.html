<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#f0d0e8">
<title>💑 雅寶 & 熙寶の日曆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ya:#e060a0;--ya2:#f090c0;--ya-bg:rgba(224,96,160,.1);--ya-bd:#f0b8d8;
  --xi:#7050d0;--xi2:#a080e0;--xi-bg:rgba(112,80,208,.1);--xi-bd:#c0a8f0;
  --grad:linear-gradient(135deg,#e060a0,#a060d0);
}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(160deg,#ffe8f4 0%,#f4e8ff 50%,#e8eeff 100%);min-height:100vh;padding-bottom:74px;overflow-x:hidden}

/* setup */
#setup-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#ffe8f4,#f4e8ff,#e8eeff);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.setup-card{background:rgba(255,255,255,.96);border-radius:28px;padding:28px 22px;width:100%;max-width:380px;box-shadow:4px 8px 0 #f0c0e0;border:3px solid var(--ya-bd)}
.setup-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px}
.setup-sub{font-size:.75rem;color:#b080c0;text-align:center;margin-bottom:20px;line-height:1.7}
.s-inp{width:100%;padding:11px 14px;border:2.5px solid var(--ya-bd);border-radius:14px;font-family:inherit;font-size:.85rem;color:#9060c0;background:rgba(255,255,255,.9);outline:none;margin-bottom:10px}
.s-inp:focus{border-color:var(--ya)}
.s-btn{width:100%;padding:13px;background:var(--grad);color:#fff;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;box-shadow:2px 4px 0 #c040a0;margin-top:6px}
.s-hint{font-size:.63rem;color:#c0a0c0;margin-top:12px;text-align:center;line-height:1.8}

/* header */
.hdr{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:2px solid transparent;border-image:var(--grad) 1}
.hdr-logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e06060;margin-right:4px;vertical-align:middle}
.sdot.ok{background:#60d080}.sdot.ing{background:#e0c060;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* layout */
.body{padding:10px 12px 0;max-width:430px;margin:0 auto}
.card{background:rgba(255,255,255,.88);border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:2px 4px 0 #f0d0e8;position:relative;overflow:hidden;border:2px solid #f0d8ec}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.sec-lbl{font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;color:var(--ya);margin-bottom:10px}
.nav-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--ya-bd);background:rgba(255,255,255,.8);color:var(--ya);font-weight:900;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* 班表 */
.days-row{display:grid;gap:4px;margin-bottom:10px}
.dp{border-radius:12px;padding:6px 3px;text-align:center;cursor:pointer;transition:all .15s;border:2px solid rgba(220,180,220,.25);background:rgba(255,255,255,.65)}
.dp.act{background:var(--grad);border-color:var(--ya)}
.dp.off{background:linear-gradient(135deg,#c8e8ff,#a8d8ff);border-color:#70b8f0}
.dp.tod{border-color:var(--ya);border-width:2.5px}
.dp-wd{font-size:.5rem;font-weight:700;color:#c090c0;margin-bottom:1px}
.dp.act .dp-wd,.dp.act .dp-n,.dp.act .dp-m{color:#fff}
.dp.off .dp-wd,.dp.off .dp-n{color:#2060a0}
.dp-n{font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:900;color:#a060b0}
.dp-m{font-size:.5rem;min-height:10px}
.shift-hero{text-align:center;background:linear-gradient(135deg,rgba(224,96,160,.1),rgba(112,80,208,.07));border-radius:18px;padding:14px;margin-bottom:10px;border:2px dashed var(--ya-bd)}
.time-big{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:var(--ya);margin:4px 0}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ib{background:rgba(255,255,255,.75);border:2px solid #f0d8ec;border-radius:14px;padding:10px;text-align:center}
.ib.full{grid-column:1/-1}
.ib.clean{background:linear-gradient(135deg,rgba(255,240,180,.6),rgba(255,224,120,.4));border-color:#f0d050}
.i-i{font-size:1.1rem;margin-bottom:2px}
.i-l{font-size:.56rem;font-weight:900;color:#b080b0;margin-bottom:3px}
.i-v{font-size:.72rem;font-weight:700;color:var(--ya)}
.i-v.dim{color:#ccc}
.srow{display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,.65);border:1.5px solid #f0d0e8;border-radius:12px;padding:8px 10px;margin-bottom:5px}
.sdot2{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sslot{font-size:.6rem;font-weight:700;color:#b080b0;min-width:54px}
.spp{font-size:.72rem;font-weight:700;color:var(--ya);line-height:1.75;flex:1}
.me-tag{background:rgba(224,96,160,.15);border-radius:7px;padding:0 5px;color:#d040a0;font-weight:900}
.pt{font-size:.62rem;color:#b090b0}

/* 日曆 */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cc{border-radius:10px;padding:4px 2px 5px;text-align:center;background:rgba(255,255,255,.6);border:1.5px solid rgba(220,180,230,.2);cursor:pointer;transition:all .15s;min-height:46px;position:relative}
.cc:hover{background:rgba(255,255,255,.9)}
.cc.ct{background:var(--grad);border-color:var(--ya)}
.cc.ch{background:rgba(255,210,220,.3);border-color:#ffb8cc}
.cc.co{background:linear-gradient(135deg,#d8f0ff,#bce4ff);border-color:#80c8f8}
.cc.cs{outline:2.5px solid var(--ya);outline-offset:1px}
.cn{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;color:#a060b0}
.cc.ct .cn{color:#fff}
.cc.ch .cn{color:#c04060}
.cc.co .cn{color:#1060a0}
.cmr{display:flex;justify-content:center;gap:1px;min-height:18px;align-items:center;flex-wrap:wrap;margin-top:1px}
.cmp{font-size:.68rem;line-height:1}

/* 情侶心情卡 */
.couple-card{background:rgba(255,255,255,.92);border:2.5px solid var(--ya-bd);border-radius:22px;padding:16px;margin-top:10px;position:relative;overflow:hidden}
.couple-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.mood-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mhalf{border-radius:18px;padding:12px 10px;text-align:center}
.mhalf.ya{background:linear-gradient(135deg,rgba(224,96,160,.12),rgba(255,160,200,.06));border:2px solid var(--ya-bd)}
.mhalf.xi{background:linear-gradient(135deg,rgba(112,80,208,.1),rgba(160,120,240,.06));border:2px solid var(--xi-bd)}
.mh-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:.72rem;margin-bottom:4px}
.mh-name.ya{color:var(--ya)}.mh-name.xi{color:var(--xi)}
.mh-em{font-size:2.2rem;line-height:1;margin:4px 0}
.mh-wx{font-size:.78rem;margin-top:3px}
.mh-tags{font-size:.58rem;color:#a070b0;margin-top:4px;line-height:1.6;min-height:14px}
.mh-diary{font-size:.68rem;color:#9060a0;font-style:italic;margin-top:6px;background:rgba(255,255,255,.65);border-radius:8px;padding:6px 8px;min-height:30px;text-align:left;line-height:1.6;word-break:break-all}
.divider{height:1px;background:var(--grad);opacity:.2;border-radius:1px;margin:12px 0}

/* 編輯區 */
.eotabs{display:flex;gap:8px;margin-bottom:10px}
.eotab{flex:1;padding:9px 6px;border-radius:14px;border:2px solid var(--ya-bd);background:rgba(255,255,255,.7);text-align:center;cursor:pointer;font-weight:700;font-size:.76rem;color:#b080b0;transition:all .18s}
.eotab.ya.on{background:linear-gradient(135deg,var(--ya),var(--ya2));color:#fff;border-color:var(--ya)}
.eotab.xi.on{background:linear-gradient(135deg,var(--xi),var(--xi2));color:#fff;border-color:var(--xi)}
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.mbtn{border:2px solid transparent;border-radius:11px;padding:6px 2px;text-align:center;cursor:pointer;background:rgba(255,255,255,.7);transition:all .18s}
.mbtn.on-ya{border-color:var(--ya);background:var(--ya-bg);transform:scale(1.06)}
.mbtn.on-xi{border-color:var(--xi);background:var(--xi-bg);transform:scale(1.06)}
.mem{font-size:1.25rem}.mlbl{font-size:.5rem;color:#b080b0;font-weight:700;margin-top:1px}
.wx-row{display:flex;gap:5px;margin-bottom:10px}
.wxb{flex:1;border:2px solid var(--ya-bd);border-radius:11px;padding:5px 2px;text-align:center;cursor:pointer;background:rgba(255,255,255,.7);transition:all .18s}
.wxb.on{background:linear-gradient(135deg,rgba(96,160,240,.2),rgba(96,200,240,.1));border-color:#70b8f8}
.wxe{font-size:1rem}.wxl{font-size:.54rem;color:#7090b0;font-weight:700;margin-top:1px}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tbtn{border:2px solid var(--ya-bd);border-radius:16px;padding:4px 8px;font-size:.68rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.7);color:#a070b0;transition:all .18s}
.tbtn.on-ya{background:linear-gradient(135deg,var(--ya),var(--ya2));border-color:var(--ya);color:#fff}
.tbtn.on-xi{background:linear-gradient(135deg,var(--xi),var(--xi2));border-color:var(--xi);color:#fff}
textarea.diary{width:100%;padding:9px 11px;border:2px solid var(--ya-bd);border-radius:12px;font-family:inherit;font-size:.82rem;color:#9060c0;background:rgba(255,255,255,.9);outline:none;resize:none}
.sbtn{width:100%;padding:10px;background:var(--grad);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;margin-top:8px;box-shadow:2px 3px 0 #c040a0}

/* 行程 */
.erow{display:flex;align-items:center;gap:8px;border-radius:13px;padding:9px 12px;margin-bottom:6px;border:1.5px solid var(--ya-bd);background:rgba(255,255,255,.7)}
.erow.done{background:rgba(160,240,190,.2);border-color:#80d0a0}
.chk{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--ya-bd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chk.ck{background:linear-gradient(135deg,#80d0a0,#50b070);border-color:#60c080}
.inp{width:100%;padding:9px 11px;border:2px solid var(--ya-bd);border-radius:12px;font-family:inherit;font-size:.82rem;color:#9060c0;background:rgba(255,255,255,.9);outline:none}
.abtn{width:100%;padding:11px;background:var(--grad);color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.88rem;cursor:pointer;box-shadow:2px 3px 0 #c040a0}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.ilbl{font-size:.63rem;font-weight:700;color:#b080b0;margin-bottom:3px}
.ob{font-size:.58rem;border-radius:6px;padding:1px 6px;font-weight:900;white-space:nowrap}
.ob-ya{background:var(--ya-bg);color:var(--ya)}
.ob-xi{background:var(--xi-bg);color:var(--xi)}
.ob-co{background:rgba(140,80,200,.1);color:#7040b0}
.couple-ev{background:linear-gradient(135deg,var(--ya-bg),var(--xi-bg));border:2px solid #f0b0e8;border-radius:16px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden}
.couple-ev::after{content:'💑';position:absolute;right:10px;top:10px;font-size:1rem;opacity:.2}

/* 設定 */
.cfg-card{background:rgba(255,255,255,.92);border-radius:20px;padding:16px;margin-bottom:12px;border:2px solid var(--ya-bd)}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #f0d0e8}
.cfg-row:last-child{border-bottom:none}
.cfg-lbl{font-size:.8rem;font-weight:700;color:#a060b0}
.cfg-val{font-size:.75rem;color:#c060a0;font-weight:700}
.cfg-btn{padding:6px 14px;border:none;border-radius:10px;font-size:.72rem;font-weight:900;cursor:pointer;background:var(--grad);color:#fff}
.cfg-btn.danger{background:linear-gradient(135deg,#e06060,#c04040);box-shadow:none}

/* tabbar */
.tabbar{display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:2px solid transparent;border-image:var(--grad) 1;position:fixed;bottom:0;left:0;right:0;padding:6px 0;z-index:50}
.tb{flex:1;text-align:center;padding:5px 2px;border-radius:12px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:.62rem;font-weight:700;color:#b080c0;cursor:pointer}
.tb.on{background:var(--grad);color:#fff}

.float{display:inline-block;animation:float 3s ease-in-out infinite}
.deco{text-align:center;margin:4px 0 10px;font-size:1.5rem;letter-spacing:4px}
.empty{text-align:center;color:#d0a0c0;font-size:.82rem;padding:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(60,20,60,.88);color:#fff;padding:9px 20px;border-radius:20px;font-size:.78rem;font-weight:700;z-index:400;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
</style>
</head>
<body>

<!-- ── 首次設定 ── -->
<div id="setup-overlay">
  <div class="setup-card">
    <div style="font-size:2.8rem;text-align:center;margin-bottom:6px">💑</div>
    <div class="setup-title">雅寶 & 熙寶の日曆</div>
    <div class="setup-sub">第一次使用請填入 Supabase 資訊<br>設定後所有裝置自動共享同步 🌸<br><small style="color:#c0a0c0">下次開啟不需要再填</small></div>
    <input class="s-inp" id="sb-url" placeholder="Supabase Project URL" type="url">
    <input class="s-inp" id="sb-key" placeholder="anon public key" type="text">
    <button class="s-btn" id="setup-go" onclick="doSetup()">💑 連線進入</button>
    <div class="s-hint">Supabase → Settings → API 取得上面兩項</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="hdr" id="main-hdr" style="display:none">
  <div>
    <div class="hdr-logo">💑 雅寶 & 熙寶の日曆</div>
    <div style="font-size:.68rem;font-weight:700;color:var(--ya);margin-top:1px" id="hdr-today"></div>
    <div id="hdr-shift" style="margin-top:2px"></div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div style="font-size:.6rem;font-weight:700;color:#9060c0;text-align:right;line-height:1.7">
      <span class="sdot" id="sdot"></span><span id="slbl">連線中</span>
    </div>
    <div style="font-size:1.4rem" class="float">🐾</div>
  </div>
</div>

<div class="body" id="main-body" style="display:none">
  <div id="tab-s"></div>
  <div id="tab-c" style="display:none"></div>
  <div id="tab-p" style="display:none"></div>
  <div id="tab-cfg" style="display:none"></div>
</div>

<div class="tabbar" id="main-tab" style="display:none">
  <button class="tb on" id="tb-s" onclick="goTab('s')"><div>🐾</div>班表</button>
  <button class="tb" id="tb-c" onclick="goTab('c')"><div>💑</div>日曆</button>
  <button class="tb" id="tb-p" onclick="goTab('p')"><div>📅</div>行程</button>
  <button class="tb" id="tb-cfg" onclick="goTab('cfg')"><div>⚙️</div>設定</button>
</div>

<script>
// ════════════ 全域 ════════════
let sb=null, curTab='s';
let selDate='', calY=0, calM=0, selCalDate='', editOwner='雅寶';
let shiftsCache=[], eventsCache=[], moodsCache={};
const LS_URL='bbv11_url', LS_KEY='bbv11_key';

// ════════════ Supabase ════════════
async function doSetup(){
  const url=document.getElementById('sb-url').value.trim();
  const key=document.getElementById('sb-key').value.trim();
  if(!url||!key){toast('請填入 URL 和 Key');return}
  const btn=document.getElementById('setup-go');
  btn.innerHTML='<span class="spinner"></span>連線中…';btn.disabled=true;
  try{
    sb=window.supabase.createClient(url,key);
    const{error}=await sb.from('shifts').select('id',{count:'exact',head:true});
    if(error)throw error;
    localStorage.setItem(LS_URL,url);localStorage.setItem(LS_KEY,key);
    await enterApp();
  }catch(e){toast('❌ 連線失敗：'+e.message);btn.innerHTML='💑 連線進入';btn.disabled=false;}
}
async function tryAutoLogin(){
  const url=localStorage.getItem(LS_URL),key=localStorage.getItem(LS_KEY);
  if(!url||!key)return false;
  try{sb=window.supabase.createClient(url,key);const{error}=await sb.from('shifts').select('id',{count:'exact',head:true});if(error)throw error;return true;}catch{return false;}
}
function setSyncIng(){document.getElementById('sdot').className='sdot ing';document.getElementById('slbl').textContent='同步中'}
function setSyncOk(){document.getElementById('sdot').className='sdot ok';document.getElementById('slbl').textContent='已同步'}
function setSyncErr(){document.getElementById('sdot').className='sdot';document.getElementById('slbl').textContent='離線'}

// ════════════ 進入主畫面 ════════════
async function enterApp(){
  document.getElementById('setup-overlay').style.display='none';
  document.getElementById('main-hdr').style.display='';
  document.getElementById('main-body').style.display='';
  document.getElementById('main-tab').style.display='flex';
  selDate=todayStr(); calY=parseD(selDate).getFullYear(); calM=parseD(selDate).getMonth();
  setSyncIng();
  await Promise.all([loadShifts(),loadEvents(),loadMoods()]);
  setSyncOk(); buildWeeks(); findCurWeek(); initHdr(); renderS();
  subRealtime();
}
async function loadShifts(){const{data}=await sb.from('shifts').select('*').order('work_date').order('shift_key');if(data)shiftsCache=data;}
async function loadEvents(){const{data}=await sb.from('events').select('*').order('event_date').order('event_time');if(data)eventsCache=data;}
async function loadMoods(){const{data}=await sb.from('moods').select('*');moodsCache={};(data||[]).forEach(r=>{moodsCache[r.owner+'_'+r.mood_date]=r;});}
function subRealtime(){
  sb.channel('rt_all')
    .on('postgres_changes',{event:'*',schema:'public',table:'events'},()=>loadEvents().then(()=>curTab==='p'&&renderP()))
    .on('postgres_changes',{event:'*',schema:'public',table:'moods'},()=>loadMoods().then(()=>curTab==='c'&&renderC()))
    .subscribe();
}

// ════════════ 工具 ════════════
function p2(n){return String(n).padStart(2,'0')}
function todayStr(){const t=new Date();return`${t.getFullYear()}-${p2(t.getMonth()+1)}-${p2(t.getDate())}`}
function parseD(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}
function d2s(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function getWD(d){return['日','一','二','三','四','五','六'][parseD(d).getDay()]}
const TODAY=todayStr();

const SDEFS=[
  {key:'凌晨班',time:'05:00-09:00',icon:'🌙',color:'#b3d4ff'},
  {key:'早班',  time:'08:00-12:00',icon:'☀️',color:'#ffe08a'},
  {key:'下午班',time:'12:00-18:00',icon:'🌸',color:'#ffb3cc'},
  {key:'晚班',  time:'18:00-23:00',icon:'🌆',color:'#c8a0ff'},
  {key:'跨夜班',time:'22:00-07:00',icon:'🌛',color:'#98e0c8'},
];
const HOLIDAYS={

function getMood(o,d){return moodsCache[o+'_'+d]||{}}
function isBallWork(d){return shiftsCache.some(r=>r.work_date===d&&r.staff_name==='球球')}
function getBallShift(d){const r=shiftsCache.find(r=>r.work_date===d&&r.staff_name==='球球');return r?SDEFS.find(s=>s.key===r.shift_key)||null:null}
function getBallTime(d){const r=shiftsCache.find(r=>r.work_date===d&&r.staff_name==='球球');return r?.time_range||null}

// ════════════ 週 ════════════
let WEEKS=[],curWeekI=0;
function buildWeeks(){
  const dates=[...new Set(shiftsCache.map(r=>r.work_date))].sort();
  const wks=[],seen={};
  dates.forEach(s=>{
    const d=parseD(s),sun=new Date(d-d.getDay()*86400000),k=d2s(sun);
    if(!seen[k]){seen[k]=[];wks.push(seen[k]);}
    if(!seen[k].includes(s))seen[k].push(s);
  });
  const N=['日','一','二','三','四','五','六'];
  WEEKS=wks.map(ds=>{
    const f=parseD(ds[0]),l=parseD(ds[ds.length-1]);
    return{label:`${f.getMonth()+1}/${f.getDate()}（${N[f.getDay()]}）～${l.getMonth()+1}/${l.getDate()}（${N[l.getDay()]}）`,dates:ds};
  });
}
function findCurWeek(){for(let i=0;i<WEEKS.length;i++)if(WEEKS[i].dates.includes(TODAY)){curWeekI=i;return;}curWeekI=WEEKS.length-1;}

// ════════════ Tab ════════════
function goTab(t){
  curTab=t;
  ['s','c','p','cfg'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'block':'none';
    const tb=document.getElementById('tb-'+id);if(tb)tb.className='tb'+(id===t?' on':'');
  });
  if(t==='s')renderS();if(t==='c')renderC();if(t==='p')renderP();if(t==='cfg')renderCfg();
  window.scrollTo(0,0);
}

function selCal(k){selCalDate=selCalDate===k?'':k;if(selCalDate)editOwner='雅寶';renderC()}
function calPrev(){calM--;if(calM<0){calM=11;calY--;}selCalDate='';renderC()}
function calNext(){calM++;if(calM>11){calM=0;calY++;}selCalDate='';renderC()}
function switchOwner(o,d){editOwner=o;selCalDate=d;renderC()}

async function upsertMood(date,patch){
  const k=editOwner+'_'+date;
  moodsCache[k]={...moodsCache[k]||{},...patch,owner:editOwner,mood_date:date};
  setSyncIng();
  const{error}=await sb.from('moods').upsert({owner:editOwner,mood_date:date,...patch},{onConflict:'owner,mood_date'});
  if(error){setSyncErr();toast('❌ 失敗');}else setSyncOk();
  renderC();
}
async function setMood(d,em){const c=getMood(editOwner,d);await upsertMood(d,{mood_emoji:c.mood_emoji===em?null:em})}
async function setWx(d,em){const c=getMood(editOwner,d);await upsertMood(d,{weather:c.weather===em?null:em})}
async function togTag(d,t){const c=getMood(editOwner,d);const tags=[...(c.tags||[])];const i=tags.indexOf(t);if(i>=0)tags.splice(i,1);else tags.push(t);await upsertMood(d,{tags})}
async function saveMood(d){const ta=document.getElementById('d-'+d);await upsertMood(d,{diary:ta?ta.value:''});toast('💑 已同步！');const b=event.target;b.textContent='✅ 儲存成功！';setTimeout(()=>b.textContent='💑 儲存並同步',1500)}

function obadge(o){

async function addEvt(){
  const d=document.getElementById('ev-d').value,ti=document.getElementById('ev-t').value||null;
  const ttl=document.getElementById('ev-ttl').value,ow=document.getElementById('ev-ow').value;
  if(!d||!ttl){toast('請填日期和事情');return}
  setSyncIng();
  const{data,error}=await sb.from('events').insert({owner:ow,event_date:d,event_time:ti,title:ttl,done:false}).select().single();
  if(error){setSyncErr();toast('❌ 失敗');return}
  eventsCache.push(data);eventsCache.sort((a,b)=>a.event_date.localeCompare(b.event_date));
  setSyncOk();renderP();toast('🌸 加入成功！');
}
async function delEvt(id){await sb.from('events').delete().eq('id',id);eventsCache=eventsCache.filter(e=>e.id!==id);renderP();}
async function togDone(id){const e=eventsCache.find(e=>e.id===id);if(!e)return;e.done=!e.done;await sb.from('events').update({done:e.done}).eq('id',id);renderP();}
function renderP(){

  const tre=eventsCache.filter(e=>e.event_date===tmr);
  const co=eventsCache.filter(e=>e.owner==='共用'&&e.event_date>=TODAY).slice(0,6);
  let h=`<div class="deco">${['💕','🌸','💑','🌸','💕'].map((e,i)=>`<span class="float" style="animation-delay:${i*.3}s">${e}</span>`).join('')}</div>`;
  if(co.length)h+=`<div class="couple-ev"><div class="sec-lbl" style="color:#7040b0;margin-bottom:8px">💑 兩人共同行程</div>${co.map(e=>`<div class="erow${e.done?' done':''}" style="border-color:#e0b8f8;background:rgba(255,255,255,.82)"><div class="chk${e.done?' ck':''}" onclick="togDone('${e.id}')">${e.done?'<span style="color:#fff;font-size:.7rem">✓</span>':''}</div><div style="flex:1"><div style="font-weight:700;font-size:.82rem;color:#7040b0;text-decoration:${e.done?'line-through':'none'}">${e.event_time?e.event_time.slice(0,5)+' ':''}${e.title}</div><div style="font-size:.6rem;color:#a080c0">${e.event_date}</div></div><button style="background:none;border:none;color:#d8b8e8;cursor:pointer" onclick="delEvt('${e.id}')">✕</button></div>`).join('')}</div>`;
  if(tre.length)h+=`<div class="card" style="border-color:var(--ya)"><div class="sec-lbl">🔔 明天的行程</div>${tre.map(e=>`<div class="erow">${obadge(e.owner)}<div style="flex:1;font-weight:700;font-size:.82rem;color:var(--ya)">${e.event_time?e.event_time.slice(0,5)+' ':''}${e.title}</div></div>`).join('')}</div>`;
  if(te.length)h+=`<div class="card"><div class="sec-lbl">⭐ 今天的行程</div>${te.map(e=>`<div class="erow${e.done?' done':''}">${obadge(e.owner)}<div class="chk${e.done?' ck':''}" onclick="togDone('${e.id}')">${e.done?'<span style="color:#fff;font-size:.7rem">✓</span>':''}</div><div style="flex:1;font-weight:700;font-size:.82rem;color:${e.done?'#60a070':'var(--ya)'};text-decoration:${e.done?'line-through':'none'}">${e.event_time?e.event_time.slice(0,5)+' ':''}${e.title}</div><button style="background:none;border:none;color:var(--ya-bd);cursor:pointer" onclick="delEvt('${e.id}')">✕</button></div>`).join('')}</div>`;
  h+=`<div class="card"><div class="sec-lbl">📝 新增行程</div>
    <div class="ig2"><div><div class="ilbl">📅 日期 *</div><input class="inp" type="date" id="ev-d"></div><div><div class="ilbl">⏰ 時間</div><input class="inp" type="time" id="ev-t"></div></div>
    <div style="margin-bottom:8px"><div class="ilbl">🌸 事情 *</div><input class="inp" type="text" id="ev-ttl" placeholder="一起看電影、約會、看醫生…"></div>
    <div style="margin-bottom:10px"><div class="ilbl">👤 誰的行程</div><select class="inp" id="ev-ow"><option value="共用">💑 共用</option><option value="雅寶">🌸 雅寶</option><option value="熙寶">🌟 熙寶</option></select></div>
    <button class="abtn" onclick="addEvt()">💑 加入並同步</button></div>`;
  h+=`<div class="card"><div class="sec-lbl">📋 全部行程</div>${eventsCache.length?eventsCache.map(e=>{const ip=e.event_date<TODAY,it=e.event_date===TODAY;return`<div class="erow${e.done?' done':''}" style="opacity:${ip&&!e.done?.55:1};border-color:${it?'var(--ya)':'var(--ya-bd)'}">${obadge(e.owner)}<div class="chk${e.done?' ck':''}" onclick="togDone('${e.id}')">${e.done?'<span style="color:#fff;font-size:.7rem">✓</span>':''}</div><div style="flex:1"><div style="font-weight:700;font-size:.78rem;color:${e.done?'#60a070':ip?'#c090a0':'var(--ya)'};text-decoration:${e.done?'line-through':'none'}">${e.event_time?e.event_time.slice(0,5)+' ':''}${e.title}</div><div style="font-size:.58rem;color:#a080a0">${e.event_date}${it?' 今天':''}${e.done?' ✨':''}</div></div><button style="background:none;border:none;color:var(--ya-bd);cursor:pointer" onclick="delEvt('${e.id}')">✕</button></div>`}).join(''):`<div class="empty">還沒有行程，快一起規劃吧 💑</div>`}</div>`;
  document.getElementById('tab-p').innerHTML=h;
}

// ════════════ 設定 ════════════
function renderCfg(){
  const url=localStorage.getItem(LS_URL)||'—';
  document.getElementById('tab-cfg').innerHTML=`
  <div class="deco">${['⚙️','🌸','💑','🌸','⚙️'].map((e,i)=>`<span class="float" style="animation-delay:${i*.3}s">${e}</span>`).join('')}</div>
  <div class="cfg-card">
    <div style="font-family:'Nunito',sans-serif;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:.95rem;margin-bottom:12px">⚙️ 連線設定</div>
    <div class="cfg-row">
      <div><div class="cfg-lbl">☁️ 連線狀態</div><div class="cfg-val" id="cfg-status">確認中…</div></div>
    </div>
    <div class="cfg-row">
      <div><div class="cfg-lbl">🔗 Supabase URL</div><div style="font-size:.62rem;color:#b090b0;word-break:break-all;max-width:220px">${url.length>40?url.slice(0,40)+'…':url}</div></div>
    </div>
    <div class="cfg-row">
      <div class="cfg-lbl">🔄 手動同步</div>
      <button class="cfg-btn" onclick="manualSync()">立即同步</button>
    </div>
    <div class="cfg-row">
      <div class="cfg-lbl">🔌 重設連線</div>
      <button class="cfg-btn danger" onclick="resetConn()">重設</button>
    </div>
  </div>
  <div class="cfg-card">
    <div style="font-family:'Nunito',sans-serif;font-weight:900;color:#a060b0;font-size:.88rem;margin-bottom:10px">📱 如何在其他裝置同步？</div>
    <div style="font-size:.75rem;color:#9060a0;line-height:2">
      1. 在新裝置開啟此網頁<br>
      2. 輸入<strong>相同的 Supabase URL + Key</strong><br>
      3. 點擊連線，即可自動同步所有資料 🎉
    </div>
  </div>
  <div class="cfg-card">
    <div style="font-family:'Nunito',sans-serif;font-weight:900;color:#a060b0;font-size:.88rem;margin-bottom:10px">💑 資料說明</div>
    <div style="font-size:.75rem;color:#9060a0;line-height:2">
      📅 行程：雅寶 / 熙寶 / 共用三種<br>
      🌸 心情：雅寶和熙寶各自記錄<br>
      🔄 Realtime：對方更新後自動顯示<br>
      🔒 資料存在你們自己的 Supabase
    </div>
  </div>`;
  // 確認連線狀態
  sb.from('shifts').select('id',{count:'exact',head:true}).then(({error})=>{
    const el=document.getElementById('cfg-status');
    if(el)el.textContent=error?'❌ 無法連線':'✅ 連線正常';
  });
}
async function manualSync(){
  setSyncIng();
  await Promise.all([loadShifts(),loadEvents(),loadMoods()]);
  buildWeeks();setSyncOk();toast('🔄 同步完成！');
  if(curTab==='s')renderS();if(curTab==='c')renderC();if(curTab==='p')renderP();
}
function resetConn(){if(confirm('確定要重設連線資訊嗎？')){localStorage.removeItem(LS_URL);localStorage.removeItem(LS_KEY);location.reload();}}

// ════════════ Toast ════════════
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

// ════════════ 啟動 ════════════
(async()=>{
  const ok=await tryAutoLogin();
  if(ok){document.getElementById('setup-overlay').style.display='none';await enterApp();}
  else{const u=localStorage.getItem(LS_URL);if(u)document.getElementById('sb-url').value=u;}
})();
</script>
</body>
</html>
